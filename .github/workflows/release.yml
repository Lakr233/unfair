name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and publish release
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          uname -a

      - name: Build
        run: swift build -c release --product unfair-swift

      - name: Package
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          arch="$(uname -m)"
          name="unfair-swift-${tag}-macos-${arch}"
          mkdir -p "dist/${name}"
          cp ".build/release/unfair-swift" "dist/${name}/unfair-swift"
          cp README.txt LICENSE "dist/${name}/"
          chmod 755 "dist/${name}/unfair-swift"
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/*.tar.gz --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${tag}" dist/*.tar.gz \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${tag}" \
              --notes "Release ${tag}" \
              --verify-tag
          fi
